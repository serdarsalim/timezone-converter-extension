<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asr World Clock</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div class="header-brand" aria-label="Asr">
          <img class="header-brand-icon" src="icons/icon-32.png" alt="" width="20" height="20">
          <span class="header-brand-name">ASR</span>
        </div>
        <div class="header-center">
          <button class="reset-button header-reset-button hidden" id="header-reset-button" type="button">Reset to now</button>
        </div>
        <div class="header-group">
          <button class="header-icon-button calendar-toggle-button" id="calendar-toggle-button" type="button" aria-label="Toggle calendar view">🗓</button>
          <div class="header-actions">
            <button class="header-icon-button" id="settings-button" type="button" aria-label="Time format settings">⚙</button>
            <div class="settings-popover hidden" id="settings-popover" aria-label="Time format">
              <p class="settings-label">Time format</p>
              <div class="settings-toggle" role="group" aria-label="Time format">
                <button class="settings-toggle-option" data-role="time-format" data-format="12h" type="button">12h</button>
                <button class="settings-toggle-option" data-role="time-format" data-format="24h" type="button">24h</button>
              </div>
              <div class="settings-divider"></div>
              <button class="settings-option settings-switch-row" data-role="pin-first-timezone" type="button">
                <span class="settings-switch-label">Pin first timezone</span>
                <span class="settings-switch" aria-hidden="true">
                  <span class="settings-switch-knob"></span>
                </span>
              </button>
              <button class="settings-option settings-switch-row" data-role="open-in-side-panel" type="button">
                <span class="settings-switch-label">Open in side panel</span>
                <span class="settings-switch" aria-hidden="true">
                  <span class="settings-switch-knob"></span>
                </span>
              </button>
              <button class="settings-option settings-switch-row" data-role="dark-mode" type="button">
                <span class="settings-switch-label">Dark mode</span>
                <span class="settings-switch" aria-hidden="true">
                  <span class="settings-switch-knob"></span>
                </span>
              </button>
            </div>
          </div>
        </div>
      </header>
      <div class="app-scroll">
        <section class="cards" id="cards"></section>
        <div class="add-button-wrap">
          <button class="floating-add-button" id="header-add-button" type="button" aria-label="Add city">+</button>
        </div>
        <section class="calendar-view hidden" id="calendar-view">
          <article class="calendar-card">
            <div class="calendar-grid">
              <label class="calendar-field">
                <span class="calendar-label">Date</span>
                <input class="calendar-input" id="calendar-date" type="date">
              </label>
              <label class="calendar-field">
                <span class="calendar-label">Local time</span>
                <div class="calendar-time-editor">
                  <input class="calendar-segment-input" id="calendar-hour" type="text" inputmode="numeric" maxlength="2" aria-label="Hour">
                  <span class="calendar-time-separator">:</span>
                  <input class="calendar-segment-input" id="calendar-minute" type="text" inputmode="numeric" maxlength="2" aria-label="Minute">
                  <select class="calendar-period-select" id="calendar-period" aria-label="AM or PM">
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                  </select>
                </div>
              </label>
            </div>
            <label class="calendar-field">
              <span class="calendar-label">Event name</span>
              <input class="calendar-input" id="calendar-title" type="text" placeholder="">
            </label>
            <div class="calendar-field">
              <span class="calendar-label">Duration</span>
              <div class="duration-options" id="duration-options">
                <button class="duration-option" data-role="duration-option" data-minutes="15" type="button">15m</button>
                <button class="duration-option is-active" data-role="duration-option" data-minutes="30" type="button">30m</button>
                <button class="duration-option" data-role="duration-option" data-minutes="45" type="button">45m</button>
                <button class="duration-option" data-role="duration-option" data-minutes="60" type="button">1h</button>
              </div>
            </div>
            <div class="calendar-preview">
              <p class="calendar-label">Time across cities</p>
              <div class="calendar-preview-list" id="calendar-preview-list"></div>
            </div>
          </article>
          <div class="calendar-submit-wrap">
            <button class="calendar-submit" id="calendar-submit" type="button">Add to calendar</button>
          </div>
        </section>
      </div>
      <template id="card-template">
        <article class="city-card" draggable="true">
          <div class="card-top">
            <div class="card-title-block">
              <button class="card-name" type="button"></button>
            </div>
            <div class="card-time-block"></div>
          </div>
          <div class="card-edit-zone"></div>
          <div class="card-bottom">
            <p class="card-date"></p>
            <div class="card-meta"></div>
          </div>
        </article>
      </template>
      <datalist id="timezone-options"></datalist>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
