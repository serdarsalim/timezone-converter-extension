<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Times</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <button class="header-icon-button calendar-toggle-button" id="calendar-toggle-button" type="button" aria-label="Toggle calendar view">🗓</button>
        <div class="header-group">
          <div class="header-actions">
            <button class="header-icon-button" id="settings-button" type="button" aria-label="Time format settings">⚙</button>
            <div class="settings-popover hidden" id="settings-popover" aria-label="Time format">
              <button class="settings-option" data-role="time-format" data-format="12h" type="button">12h</button>
              <button class="settings-option" data-role="time-format" data-format="24h" type="button">24h</button>
            </div>
          </div>
          <button class="header-add-button" id="header-add-button" type="button" aria-label="Add city">+</button>
        </div>
      </header>
      <section class="cards" id="cards"></section>
      <section class="calendar-view hidden" id="calendar-view">
        <article class="calendar-card">
          <div class="calendar-grid">
            <label class="calendar-field">
              <span class="calendar-label">Date</span>
              <input class="calendar-input" id="calendar-date" type="date">
            </label>
            <label class="calendar-field">
              <span class="calendar-label">Time</span>
              <div class="calendar-time-editor">
                <input class="calendar-segment-input" id="calendar-hour" type="text" inputmode="numeric" maxlength="2" aria-label="Hour">
                <span class="calendar-time-separator">:</span>
                <input class="calendar-segment-input" id="calendar-minute" type="text" inputmode="numeric" maxlength="2" aria-label="Minute">
                <select class="calendar-period-select" id="calendar-period" aria-label="AM or PM">
                  <option value="AM">AM</option>
                  <option value="PM">PM</option>
                </select>
              </div>
            </label>
          </div>
          <label class="calendar-field">
            <span class="calendar-label">Event name</span>
            <input class="calendar-input" id="calendar-title" type="text" placeholder="Meeting from Times">
          </label>
          <div class="calendar-field">
            <span class="calendar-label">Duration</span>
            <div class="duration-options" id="duration-options">
              <button class="duration-option" data-role="duration-option" data-minutes="15" type="button">15m</button>
              <button class="duration-option is-active" data-role="duration-option" data-minutes="30" type="button">30m</button>
              <button class="duration-option" data-role="duration-option" data-minutes="45" type="button">45m</button>
              <button class="duration-option" data-role="duration-option" data-minutes="60" type="button">1h</button>
            </div>
          </div>
          <div class="calendar-preview">
            <p class="calendar-label">Time across cities</p>
            <div class="calendar-preview-list" id="calendar-preview-list"></div>
          </div>
          <div class="calendar-actions">
            <button class="calendar-submit" id="calendar-submit" type="button">Add</button>
          </div>
        </article>
      </section>
      <template id="card-template">
        <article class="city-card" draggable="true">
          <div class="card-top">
            <div class="card-title-block">
              <button class="card-name" type="button"></button>
            </div>
            <div class="card-time-block"></div>
          </div>
          <div class="card-edit-zone"></div>
          <div class="card-bottom">
            <p class="card-date"></p>
            <div class="card-meta"></div>
          </div>
        </article>
      </template>
      <datalist id="timezone-options"></datalist>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
